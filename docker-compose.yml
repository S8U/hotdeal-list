services:
  backend:
    image: ${DOCKER_REGISTRY:-hotdeal-list}-backend:latest
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Seoul
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: ${DOCKER_REGISTRY:-hotdeal-list}-frontend:latest
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    environment:
      - TZ=Asia/Seoul
    ports:
      - "3000:3000"
    restart: unless-stopped
