# 서버 설정
server:
  port: ${SERVER_PORT:8080}

spring:
  # 데이터베이스 설정
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:hotdeal_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: false

  # Elasticsearch 설정
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}

  # Spring AI 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://openrouter.ai/api

# 로깅 설정
logging:
  level:
    com.github.s8u.hotdeallist: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} [%X{traceId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} [%X{traceId}] - %msg%n"
  file:
    name: /var/log/hotdeal-list/hotdeal-list.log
  logback:
    rollingpolicy:
      file-name-pattern: /var/log/hotdeal-list/hotdeal-list-%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

# URL 설정
base-url:
  api: ${BASE_URL_API:https://api.hotdeal-list.com}
  frontend: ${BASE_URL_FRONTEND:https://hotdeal-list.com}
