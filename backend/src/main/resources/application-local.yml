# 서버 설정
server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  tomcat:
    accesslog:
      enabled: true
      request-attributes-enabled: true
      directory: /dev
      prefix: stdout
      suffix: ""
      file-date-format: ""
      buffered: false
      pattern: '%a %l %u %t "%r" %s %b %D "%{Referer}i" "%{User-Agent}i"'

spring:
  # 데이터베이스 설정
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:hotdeal_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: false

  # Elasticsearch 설정
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}

  # Spring AI 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://openrouter.ai/api

# 로깅 설정
logging:
  level:
    com.github.s8u.hotdeallist: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} [%X{traceId}] - %msg%n"

# URL 설정
base-url:
  api: ${BASE_URL_API:http://localhost:8080}
  frontend: ${BASE_URL_FRONTEND:http://localhost:3000}

# 파일 스토리지 설정
file-store:
  type: ${FILE_STORE_TYPE:local}
  local:
    base-path: ${FILE_STORE_LOCAL_PATH:./storage}
    base-url: ${FILE_STORE_LOCAL_URL:http://localhost:8080/storage}
  s3:
    bucket: ${FILE_STORE_S3_BUCKET:}
    base-url: ${FILE_STORE_S3_BASE_URL:}
    endpoint: ${FILE_STORE_S3_ENDPOINT:}
    access-key: ${FILE_STORE_S3_ACCESS_KEY:}
    secret-key: ${FILE_STORE_S3_SECRET_KEY:}
    region: ${FILE_STORE_S3_REGION:auto}
